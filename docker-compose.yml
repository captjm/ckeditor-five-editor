services:

  ckeditor-dev:
    build: .
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./dist:/app/dist
      - ./test:/app/test
      - ./package.json:/app/package.json
      - ./yarn.lock:/app/yarn.lock
      - ./webpack.config.js:/app/webpack.config.js
      - ./node_modules:/app/node_modules
      - ./LICENSE:/app/LICENSE
      - ./LICENSES-THIRD-PARTY.txt:/app/LICENSES-THIRD-PARTY.txt
      - ./tsconfig.json:/app/tsconfig.json
    tty: true

  ckeditor-serve:
    build: .
    working_dir: /app
    command: sh -c "yarn install && npx serve . -l tcp://0.0.0.0:3000 --no-clipboard"
    volumes:
      - ./src:/app/src
      - ./dist:/app/dist
      - ./test:/app/test
      - ./public:/app/public
      - ./package.json:/app/package.json
      - ./yarn.lock:/app/yarn.lock
      - ./node_modules:/app/node_modules
    ports:
      - "3000:3000"